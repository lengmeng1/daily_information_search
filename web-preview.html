<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日信息总结 · 效果预览</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#1f2329; --sub:#646a73;
    --line:#e5e6eb; --brand:#2f6bff; --brand-soft:#eaf1ff;
    --accent:#00b96b; --warn:#ff7d00; --mask:rgba(20,24,33,.82);
    --radius:12px; --shadow:0 2px 12px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{display:flex;height:100vh;overflow:hidden}

  /* 侧栏 / 索引树 */
  .sidebar{width:300px;flex:0 0 300px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column}
  .brand{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .brand h1{font-size:16px;font-weight:700}
  .brand small{display:block;color:var(--sub);font-weight:400;font-size:12px}
  .tree{padding:10px 8px;overflow:auto;flex:1}
  .node-year>.row, .node-month>.row{font-weight:600;cursor:pointer}
  .row{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;font-size:14px;user-select:none}
  .row:hover{background:var(--brand-soft)}
  .row .caret{transition:transform .15s;color:var(--sub);font-size:11px;width:12px;text-align:center}
  .collapsed>.row .caret{transform:rotate(-90deg)}
  .children{margin-left:14px;border-left:1px dashed var(--line);padding-left:4px}
  .collapsed>.children{display:none}
  .day .row{cursor:pointer;color:var(--ink);font-weight:400}
  .day .row .badge{margin-left:auto;font-size:11px;color:var(--sub);background:var(--bg);
    border:1px solid var(--line);border-radius:10px;padding:1px 8px}
  .day.active .row{background:var(--brand);color:#fff}
  .day.active .row .badge{color:#fff;background:rgba(255,255,255,.2);border-color:transparent}

  /* 主内容 */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);
    display:flex;align-items:center;gap:12px}
  .menu-btn{display:none;border:1px solid var(--line);background:#fff;border-radius:8px;
    width:38px;height:38px;font-size:18px;cursor:pointer}
  .topbar .status{margin-left:auto;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .topbar .status .led{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .topbar .demo{margin-left:10px;font-size:12px;color:var(--brand);border:1px solid var(--brand);
    background:var(--brand-soft);border-radius:8px;padding:5px 10px;cursor:pointer}
  .content{padding:24px 28px;overflow:auto;flex:1;max-width:880px;width:100%;margin:0 auto}
  .doc-date{color:var(--sub);font-size:13px}
  .doc-title{font-size:22px;font-weight:700;margin:4px 0 18px}
  .topic{margin-bottom:22px}
  .topic h3{font-size:15px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .topic h3 .tag{font-size:11px;background:var(--brand-soft);color:var(--brand);
    border-radius:6px;padding:2px 8px;font-weight:600}
  .topic ul{margin-left:18px}
  .topic li{margin:4px 0}
  .empty{color:var(--sub);text-align:center;margin-top:80px;font-size:14px}
  .loading{color:var(--sub);text-align:center;margin-top:80px;font-size:14px}
  .spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--brand);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 维护遮罩 */
  .mask{position:fixed;inset:0;background:var(--mask);color:#fff;display:none;
    flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:50;padding:24px}
  .mask.show{display:flex}
  .mask .ico{font-size:46px;margin-bottom:14px}
  .mask h2{font-size:22px;margin-bottom:10px}
  .mask p{color:#cdd3df;font-size:14px;max-width:420px}

  /* 移动端抽屉遮罩 */
  .drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
  .drawer-bg.show{display:block}

  /* 响应式：移动端 */
  @media (max-width:768px){
    .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:41;transform:translateX(-100%);
      transition:transform .22s;box-shadow:var(--shadow)}
    .sidebar.open{transform:translateX(0)}
    .menu-btn{display:block}
    .content{padding:18px 16px}
    .doc-title{font-size:19px}
    .topbar .status .txt{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <!-- 侧栏：年-月-日 树形索引 -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="dot"></span>
      <div><h1>每日信息总结</h1><small>AI 方向 · 树形归档</small></div>
    </div>
    <nav class="tree" id="tree"></nav>
  </aside>
  <div class="drawer-bg" id="drawerBg"></div>

  <!-- 主区 -->
  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <strong id="crumb">索引</strong>
      <span class="status"><span class="led"></span><span class="txt">正常 · 可浏览</span></span>
      <button class="demo" id="demoBtn">模拟维护中</button>
    </div>
    <section class="content" id="content">
      <div class="empty">← 从左侧选择某一天，查看当日的 AI 信息总结</div>
    </section>
  </main>
</div>

<!-- 维护遮罩（对应 status.json = maintenance 时显示） -->
<div class="mask" id="mask">
  <div class="ico">🛠️</div>
  <h2>网站维护中</h2>
  <p>正在发布今日总结、更新索引，预计 07:00 恢复访问。给您带来不便敬请谅解。</p>
</div>

<script>
/* ===== 样例数据（黑盒阶段用桩数据，后期由工作流生成） ===== */
const DATA = {
  "2026": {
    "07": {
      "07-07": {
        title: "2026-07-07 AI 每日总结",
        topics: [
          { key:"ai-news", name:"AI 新发现", items:[
            "OpenAI 发布轻量版推理模型，长上下文成本下降 40%。",
            "某开源社区推出可本地运行的 7B 多模态模型，消费级显卡即可部署。"
          ]},
          { key:"ai-learn", name:"AI 知识学习", items:[
            "通俗理解 RAG：把“检索”和“生成”串起来，让回答有据可依。",
            "LoRA 微调入门：只训练少量参数即可适配特定风格。"
          ]},
          { key:"ai-exp", name:"AI 使用经验", items:[
            "写提示词先给“角色+任务+格式+约束”，命中率明显更高。",
            "把长文档拆成小块再让模型总结，比一次性丢进去更稳。"
          ]}
        ]
      },
      "07-06": {
        title: "2026-07-06 AI 每日总结",
        topics: [
          { key:"ai-news", name:"AI 新发现", items:[
            "主流云厂商上线按 token 计费的 Agent 托管服务。"
          ]},
          { key:"ai-learn", name:"AI 知识学习", items:[
            "Function Calling 是什么：让模型决定“先调哪个工具”。"
          ]},
          { key:"ai-exp", name:"AI 使用经验", items:[
            "让模型先列大纲再写正文，结构更清晰。"
          ]}
        ]
      },
      "07-05": {
        title: "2026-07-05 AI 每日总结",
        topics: [
          { key:"ai-news", name:"AI 新发现", items:[
            "端侧大模型在手机芯片上跑通实时翻译。"
          ]},
          { key:"ai-learn", name:"AI 知识学习", items:[
            "向量数据库基础：把文字变成可比较的“坐标”。"
          ]},
          { key:"ai-exp", name:"AI 使用经验", items:[
            "给模型一个示例（few-shot），比纯描述更有效。"
          ]}
        ]
      }
    }
  }
};

/* ===== 渲染树 ===== */
const treeEl = document.getElementById('tree');
function renderTree(){
  treeEl.innerHTML = '';
  for(const y of Object.keys(DATA)){
    const yNode = node('year', y, y);
    for(const m of Object.keys(DATA[y])){
      const mNode = node('month', y+'-'+m, m+' 月');
      for(const d of Object.keys(DATA[y][m])){
        const dNode = document.createElement('div');
        dNode.className = 'day';
        const n = DATA[y][m][d].topics.reduce((s,t)=>s+t.items.length,0);
        dNode.innerHTML = `<div class="row"><span>${d}</span><span class="badge">${n} 条</span></div>`;
        dNode.querySelector('.row').onclick = ()=>openDay(y,m,d);
        mNode.children.appendChild(dNode);
      }
      yNode.children.appendChild(mNode.row);
    }
    treeEl.appendChild(yNode.row);
  }
}
function node(type, id, label){
  const wrap = document.createElement('div');
  wrap.className = 'node-'+type;
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<span class="caret">▾</span><span>${label}</span>`;
  const children = document.createElement('div');
  children.className = 'children';
  row.onclick = ()=> wrap.classList.toggle('collapsed');
  wrap.appendChild(row); wrap.appendChild(children);
  return {row:wrap, children};
}

/* ===== 打开某一天：模拟“按需加载” ===== */
const content = document.getElementById('content');
const crumb = document.getElementById('crumb');
function openDay(y,m,d){
  document.querySelectorAll('.day').forEach(e=>e.classList.remove('active'));
  // 高亮当前
  const days = treeEl.querySelectorAll('.day');
  days.forEach(e=>{ if(e.querySelector('.row').textContent.includes(d)) e.classList.add('active'); });
  crumb.textContent = `${y} / ${m} / ${d}`;
  content.innerHTML = `<div class="loading"><div class="spinner"></div>正在加载 ${y}-${m}-${d} 的总结…</div>`;
  // 模拟从仓库拉取文档（真实环境：fetch raw docs/年/月/日.md）
  setTimeout(()=>{
    const doc = DATA[y][m][d];
    let html = `<div class="doc-date">${y} 年 ${m} 月 ${d} 日</div>
                <div class="doc-title">${doc.title}</div>`;
    for(const t of doc.topics){
      html += `<div class="topic"><h3><span class="tag">${t.key}</span>${t.name}</h3><ul>`;
      for(const it of t.items) html += `<li>${it}</li>`;
      html += `</ul></div>`;
    }
    content.innerHTML = html;
    closeDrawer();
  }, 450);
}

/* ===== 移动端抽屉 ===== */
const sidebar = document.getElementById('sidebar');
const drawerBg = document.getElementById('drawerBg');
function openDrawer(){ sidebar.classList.add('open'); drawerBg.classList.add('show'); }
function closeDrawer(){ sidebar.classList.remove('open'); drawerBg.classList.remove('show'); }
document.getElementById('menuBtn').onclick = openDrawer;
drawerBg.onclick = closeDrawer;

/* ===== 维护遮罩演示（对应 status.json） ===== */
const mask = document.getElementById('mask');
const demoBtn = document.getElementById('demoBtn');
let maintaining = false;
demoBtn.onclick = ()=>{
  maintaining = !maintaining;
  mask.classList.toggle('show', maintaining);
  demoBtn.textContent = maintaining ? '恢复正常' : '模拟维护中';
};

renderTree();
</script>
</body>
</html>
